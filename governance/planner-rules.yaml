version: 1

planner_rules:

  doctrine:
    principle: >
      Do not automate, distribute, optimize, or abstract
      something that has not first been questioned,
      reduced, and understood.

    mandatory_order:
      - question
      - eliminate
      - simplify
      - accelerate
      - automate

  planning_constraints:

    always_question:
      - requirement_validity
      - operational_necessity
      - ownership
      - maintenance_cost
      - cognitive_load
      - architectural_impact

    elimination_priority:
      prefer_removal_over_expansion: true
      remove_redundant_dependencies: true
      remove_duplicate_logic: true
      remove_unused_abstractions: true
      remove_unnecessary_orchestration: true

    simplification_priority:
      prefer_explicit_behavior: true
      prefer_deterministic_flows: true
      prefer_local_reasoning: true
      prefer_human_readable_structures: true
      avoid_hidden_state: true
      avoid_magic_behavior: true
      avoid_excessive_indirection: true

    acceleration_constraints:
      optimize_only_stable_systems: true
      reject_optimization_of_workarounds: true
      reject_scaling_of_ambiguous_processes: true

    automation_constraints:
      automate_only_stable_processes: true
      require_human_governance: true
      require_auditability: true
      require_reversibility: true

  architectural_preferences:

    prefer:
      - modular_monoliths
      - markdown_memory
      - local_context
      - explicit_contracts
      - deterministic_execution
      - direct_tool_usage
      - filesystem_based_memory
      - simple_interfaces

    avoid_by_default:
      - premature_microservices
      - recursive_agent_loops
      - unnecessary_multi_agent_systems
      - framework_proliferation
      - hidden_mutable_state
      - orchestration_without_need
      - distributed_memory_without_justification
      - excessive_runtime_abstraction

  justification_required_for:
    - vector_databases
    - rag_systems
    - distributed_architecture
    - async_orchestration
    - event_driven_fragmentation
    - autonomous_background_agents
    - dynamic_self_modifying_prompts
    - persistent_hidden_memory
    - kubernetes_scale_infrastructure

  evaluation_checks:

    before_implementation:
      - does_this_already_exist
      - can_this_be_removed
      - can_this_be_merged
      - can_this_be_simplified
      - is_this_solving_a_real_problem
      - does_this_reduce_or_increase_complexity
      - does_this_reduce_or_increase_cognitive_load
      - can_humans_audit_this
      - is_this_operationally_reversible
      - is_this_premature_scaling

    reject_if:
      - architecture_complexity_exceeds_problem_complexity
      - operational_cost_exceeds_expected_value
      - system_becomes_hard_to_reason_about
      - hidden_state_is_required_without_justification
      - orchestration_exists_without_clear_need

  governance:
    human_control_required: true
    human_visibility_required: true
    human_override_required: true
    human_auditability_required: true

  runtime_constraints:

    minimize:
      - context_expansion
      - hallucination_surfaces
      - dependency_sprawl
      - unnecessary_tool_calls
      - hidden_mutations
      - operational_ambiguity

    maximize:
      - clarity
      - maintainability
      - explicitness
      - reversibility
      - deterministic_behavior

  final_principle: >
    Prefer systems that remain understandable,
    governable, and maintainable under operational pressure.
