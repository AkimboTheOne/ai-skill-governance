version: 1

runtime_policy:

  doctrine:
    principle: >
      Runtime systems must not automate, mutate, distribute,
      or escalate behavior beyond what has been explicitly
      understood, bounded, and authorized.

    enforcement_goal: >
      Preserve clarity, auditability, reversibility,
      and human governance during execution.

  execution_boundaries:

    default_mode: bounded_assistance

    autonomy:
      allow_autonomous_execution: false
      allow_background_execution: false
      allow_recursive_self_invocation: false
      allow_self_modifying_behavior: false

    write_operations:
      require_explicit_user_intent: true
      require_target_specificity: true
      allow_bulk_write_by_default: false
      allow_destructive_write_by_default: false
      require_reversibility_or_confirmation: true

    external_side_effects:
      require_explicit_authorization: true
      require_auditable_output: true
      require_clear_scope: true

  tool_usage:

    defaults:
      prefer_direct_tool_usage: true
      prefer_minimal_tool_chain: true
      avoid_tool_to_tool_recursion: true
      avoid_unnecessary_external_calls: true

    require_justification_for:
      - chained_tool_execution
      - multi_tool_orchestration
      - persistent_external_writes
      - destructive_operations
      - bulk_operations
      - background_tasks
      - autonomous_retry_loops

    reject_if:
      - tool_chain_has_no_clear_terminal_condition
      - tool_use_exceeds_task_scope
      - tool_output_cannot_be_audited
      - tool_execution_requires_hidden_state
      - tool_selection_is_based_on_guessing

  memory_policy:

    defaults:
      prefer_local_memory: true
      prefer_human_readable_memory: true
      prefer_markdown_or_plain_text: true
      avoid_hidden_memory_mutation: true
      avoid_unbounded_context_growth: true

    memory_access:
      read_only_by_default: true
      require_explicit_write_intent: true
      require_source_traceability: true
      require_context_relevance: true

    reject_if:
      - memory_write_is_not_requested
      - memory_update_lacks_clear_purpose
      - memory_content_is_not_auditable
      - memory_expansion_increases_confusion
      - memory_state_conflicts_with_current_task

  context_policy:

    context_loading:
      load_minimum_required_context: true
      prefer_task_relevant_context: true
      avoid_full_context_dumping: true
      avoid_redundant_context_injection: true

    reject_if:
      - context_is_unrelated_to_task
      - context_increases_ambiguity
      - context_conflicts_without_resolution
      - context_size_exceeds_operational_need

  planning_policy:

    mandatory_order:
      - question
      - eliminate
      - simplify
      - accelerate
      - automate

    before_execution:
      require_problem_understanding: true
      require_scope_boundary: true
      require_expected_output: true
      require_failure_mode_awareness: true

    reject_execution_if:
      - requirement_is_unjustified
      - scope_is_ambiguous_and_high_risk
      - action_is_irreversible_without_confirmation
      - automation_is_attempted_before_process_stability
      - implementation_adds_complexity_without_clear_value

  automation_policy:

    automation_default: manual_or_assisted

    allow_automation_only_if:
      - process_is_stable
      - inputs_are_clear
      - outputs_are_verifiable
      - failure_modes_are_known
      - human_override_exists
      - audit_trail_exists

    reject_automation_if:
      - workflow_is_ambiguous
      - ownership_is_unclear
      - process_is_contradictory
      - rollback_is_not_possible
      - automation_hides_complexity
      - ai_is_used_to_mask_bad_process

  governance_policy:

    human_governance:
      require_visibility: true
      require_override_capability: true
      require_auditability: true
      require_explainability: true

    escalation_required_for:
      - destructive_actions
      - security_sensitive_operations
      - compliance_sensitive_changes
      - architecture_scope_expansion
      - persistent_state_changes
      - bulk_modifications
      - irreversible_outputs

  safety_constraints:

    prohibit:
      - hidden_persistent_state_mutation
      - unauthorized_external_write
      - autonomous_destructive_action
      - recursive_unbounded_execution
      - scope_expansion_without_user_intent
      - automation_of_unknown_process
      - optimization_of_invalid_workflow

  runtime_quality_gates:

    must_preserve:
      - clarity
      - boundedness
      - auditability
      - reversibility
      - determinism_where_possible
      - human_control

    must_minimize:
      - unnecessary_context
      - unnecessary_tool_calls
      - hidden_state
      - dependency_sprawl
      - hallucination_surface
      - operational_ambiguity

  decision_outcomes:

    allowed:
      - proceed
      - proceed_with_constraints
      - request_clarification
      - propose_simpler_alternative
      - refuse_or_defer_action

    default_when_uncertain: propose_simpler_alternative

  final_principle: >
    Runtime execution must remain understandable,
    bounded, auditable, and governable under operational pressure.
